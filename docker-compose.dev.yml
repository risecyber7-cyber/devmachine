version: '3.8'

# Development override - use with:
# docker-compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=http://localhost:5000/api

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - CORS_ORIGIN=http://localhost:3000
    volumes:
      - ./backend/src:/app/src

  # Disable nginx, certbot, and monitoring in dev
  nginx:
    profiles:
      - production

  certbot:
    profiles:
      - production

  prometheus:
    profiles:
      - monitoring

  grafana:
    profiles:
      - monitoring
