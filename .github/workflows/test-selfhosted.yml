name: Self-hosted Windows VM - Setup + Test

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: [self-hosted, win10]

    steps:
      - name: Allow scripts for this job (process scope)
        shell: powershell
        run: |
          Set-ExecutionPolicy Bypass -Scope Process -Force
          Get-ExecutionPolicy -List

      - name: Install Git (better checkout performance)
        shell: powershell
        run: |
          Set-ExecutionPolicy Bypass -Scope Process -Force
          if (-not (Get-Command git -ErrorAction SilentlyContinue)) {
            winget install --id Git.Git -e --source winget --accept-package-agreements --accept-source-agreements
          }
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
          git --version

      - name: Install PowerShell 7 (optional)
        shell: powershell
        run: |
          Set-ExecutionPolicy Bypass -Scope Process -Force
          if (-not (Get-Command pwsh -ErrorAction SilentlyContinue)) {
            winget install --id Microsoft.PowerShell -e --source winget --accept-package-agreements --accept-source-agreements
          }
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
          if (Get-Command pwsh -ErrorAction SilentlyContinue) { pwsh -v } else { "pwsh not found (optional)" }

      - name: Checkout
        uses: actions/checkout@v4

      - name: System + Disk + Network
        shell: powershell
        run: |
          Set-ExecutionPolicy Bypass -Scope Process -Force
          "Hostname:"; hostname
          "User:"; whoami
          "Date:"; Get-Date
          "CPU:"; Get-CimInstance Win32_Processor | Select Name,NumberOfCores,NumberOfLogicalProcessors
          "RAM:"; Get-CimInstance Win32_ComputerSystem | Select TotalPhysicalMemory
          "Disks:"; Get-PSDrive -PSProvider FileSystem | Format-Table -AutoSize
          "IPConfig:"; ipconfig
